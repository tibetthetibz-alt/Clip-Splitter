name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build universal app and zip
        run: |
          chmod +x script/package_release.sh
          RELEASE_VERSION="${GITHUB_REF_NAME#v}" ./script/package_release.sh

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Clip-Splitter-macOS-Universal.zip
          generate_release_notes: true

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Clip-Splitter-macOS-Universal
          path: dist/Clip-Splitter-macOS-Universal.zip
